<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game Player</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; background: #0b0b0b; color: #e6e6e6; }
    .topbar {
      display: flex; align-items: center; gap: 8px; padding: 10px 12px;
      background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10;
    }
    .topbar button, .topbar a {
      appearance: none; border: 1px solid #2a2a2a; background: #1a1a1a; color: #ddd;
      padding: 6px 10px; border-radius: 6px; cursor: pointer; text-decoration: none;
    }
    .topbar button:hover, .topbar a:hover { background: #222; }
    .title { font-weight: 600; margin-left: 4px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 布局与容器尺寸（加宽主区、缩窄推荐区） */
    .wrap { max-width: 1440px; margin: 0 auto; padding: 16px; }
    .layout { display: flex; gap: 20px; align-items: flex-start; }
    .leftpane { flex: 1 1 auto; min-width: 0; }
    .rightpane { flex: 0 0 320px; max-width: 340px; }
    @media (max-width: 1200px) {
      .layout { gap: 16px; }
      .rightpane { flex-basis: 280px; max-width: 300px; }
    }
    @media (max-width: 1024px) {
      .layout { flex-direction: column; }
      .rightpane { flex: 1 1 auto; max-width: none; }
    }

    /* 左侧“游戏展示区”外观（参考截图但保持深色风格） */
    .hero {
      position: relative; border-radius: 20px; overflow: hidden;
      padding: 32px; min-height: 460px; display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(1200px 600px at 30% 20%, rgba(120,120,120,0.06), transparent 60%),
        radial-gradient(1200px 600px at 80% 80%, rgba(120,120,120,0.05), transparent 60%),
        linear-gradient(180deg, #121212, #0f0f0f);
      border: 1px solid #1e1e1e;
      box-shadow: 0 2px 20px rgba(0,0,0,.5) inset, 0 6px 24px rgba(0,0,0,.45);
    }
    .hero-card { text-align: center; max-width: 560px; }
    .hero-cover {
      width: 220px; height: 220px; border-radius: 24px; object-fit: cover; display: block;
      margin: 0 auto 18px; box-shadow: 0 8px 24px rgba(0,0,0,.6);
    }
    .hero-title { font-size: 24px; font-weight: 700; margin: 4px 0 6px; }
    .hero-sub { font-size: 14px; color: #bdbdbd; margin-bottom: 18px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 22px; border-radius: 999px; border: 1px solid #2a2a2a;
      background: linear-gradient(90deg, #5a6fff, #7b5bff); color: #fff;
      text-decoration: none; cursor: pointer; font-weight: 600; box-shadow: 0 6px 18px rgba(90,111,255,.35);
    }
    .btn-primary:hover { filter: brightness(1.05); }

    /* 播放器区域（点击 Play Now 后显示） */
    .player {
      position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000;
      border: 1px solid #1e1e1e; box-shadow: 0 2px 12px rgba(0,0,0,.5); margin-top: 16px;
    }
    .player::before { content: ""; display: block; padding-top: var(--ratio, 56.25%); }
    .player > iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000;
    }
    .hint { color: #aaa; font-size: 14px; margin-top: 10px; }
    .error { background: #2a1111; border: 1px solid #532; padding: 10px; border-radius: 6px; color: #f2c9c9; }

    /* 游戏信息展示区域样式（新增） */
    .game-info {
      margin-top: 20px;
      background: linear-gradient(135deg, #1a1a1a, #141414);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .info-section {
      margin-bottom: 20px;
    }
    .info-section:last-child {
      margin-bottom: 0;
    }
    .info-title {
      font-size: 16px;
      font-weight: 700;
      color: #cdd6f4;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-title::before {
      content: "";
      width: 4px;
      height: 16px;
      background: linear-gradient(90deg, #5a6fff, #7b5bff);
      border-radius: 2px;
    }
    .info-content {
      font-size: 14px;
      line-height: 1.6;
      color: #e6e6e6;
      margin: 0;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border-left: 3px solid #5a6fff;
    }

    /* 右侧"Similar Games"样式（两列宫格卡片） */
    .side-title { font-size: 16px; font-weight: 700; color: #cdd6f4; margin: 2px 0 12px; }
    .reco-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .reco-card {
      display: flex; gap: 10px; padding: 8px; border-radius: 12px; background: #141414;
      border: 1px solid #222; text-decoration: none; color: #ddd;
    }
    .reco-card:hover { background: #1a1a1a; }
    .reco-thumb { width: 112px; height: 72px; border-radius: 10px; object-fit: cover; background: #000; flex: 0 0 112px; }
    .reco-meta { display: flex; flex-direction: column; min-width: 0; }
    .reco-name { font-size: 13px; font-weight: 700; line-height: 1.25; margin-bottom: 6px; }
    .reco-pub { font-size: 12px; color: #a9a9a9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reco-more { display: inline-block; margin-top: 10px; font-size: 13px; color: #8fb4ff; text-decoration: none; }
    .reco-more:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="backBtn" title="Home">← Home</button>
    <div class="title" id="title">Game Player</div>
    <button id="fsBtn" title="Fullscreen" style="display:none">⛶ Fullscreen</button>
    <a id="openBtn" href="#" target="_blank" rel="noopener" title="Open in New Tab">↗ Open</a>
  </div>

  <div class="wrap">
    <div class="layout">
      <section class="leftpane">
        <!-- 详情展示（默认显示） -->
        <div id="hero" class="hero">
          <div class="hero-card">
            <img id="heroCover" class="hero-cover" src="/assets/img/logo.png" alt="">
            <div id="heroTitle" class="hero-title">Game Title</div>
            <div id="heroSub" class="hero-sub"></div>
            <button id="playBtn" class="btn-primary">▶ Play Now</button>
          </div>
        </div>

        <!-- 播放器（点击 Play Now 后显示） -->
        <div id="playerWrap" class="player" style="--ratio:56.25%; display:none">
          <iframe id="frame"
            src="about:blank"
            allow="autoplay; fullscreen; gamepad; accelerometer; magnetometer; gyroscope; xr-spatial-tracking; midi; encrypted-media; clipboard-read; clipboard-write"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock allow-presentation allow-top-navigation-by-user-activation"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
        
        <!-- 游戏信息展示区域（新增） -->
        <!-- 游戏信息展示区域（修改：默认显示） -->
        <div id="gameInfo" class="game-info">
          <div class="info-section">
            <h3 class="info-title">DESCRIPTION</h3>
            <p id="gameDescription" class="info-content">NO DATA</p>
          </div>
          <div class="info-section">
            <h3 class="info-title">INSTRUCTIONS</h3>
            <p id="gameGameplay" class="info-content">NO DATA</p>
          </div>
        </div>
        
        <div class="hint" id="hint"></div>
      </section>

      <aside class="rightpane">
        <div class="side-title">Recommend Games</div>
        <div id="recoGrid" class="reco-grid"></div>
        <a class="reco-more" href="/app.html">More Games→</a>
      </aside>
    </div>
  </div>

  <script>
  // 修改URL参数处理逻辑
  const urlParams = new URLSearchParams(window.location.search);
  let currentGame = null;
  
  // 检查是否是新的路径格式（如 /snowrider3d）
  if (!urlParams.get('title') && !urlParams.get('src')) {
  const gamePath = window.location.pathname.substring(1); // 移除开头的 '/'
  console.log('Game path from URL:', gamePath);
  
  // 从games.json加载游戏数据并匹配
  fetch('/assets/JSON/games.json')
  .then(response => response.json())
  .then(games => {
  console.log('Loaded games:', games.length);
  
  // 生成slug的函数（与服务器端保持一致）
  function generateGameSlug(gameName) {
  return gameName
  .toLowerCase()
  .replace(/[^a-z0-9\s]/g, '')
  .replace(/\s+/g, '')
  .trim();
  }
  
  // 查找匹配的游戏
  const matchedGame = games.find(game => {
  const slug = generateGameSlug(game.name);
  console.log('Comparing:', slug, 'with', gamePath);
  return slug === gamePath;
  });
  
  if (matchedGame) {
  console.log('Matched game:', matchedGame);
  currentGame = matchedGame;
  
  // 创建虚拟的URLSearchParams
  const gameUrl = new URL(matchedGame.url, window.location.origin);
  const title = gameUrl.searchParams.get('title') || matchedGame.name;
  const src = gameUrl.searchParams.get('src') || matchedGame.url;
  
  // 更新URLSearchParams
  urlParams.set('title', title);
  urlParams.set('src', src);
  
  // 执行页面初始化
  initializePage();
  } else {
  console.log('No matching game found for:', gamePath);
  document.getElementById('heroTitle').textContent = 'Game Not Found';
  document.getElementById('gameDescription').textContent = 'The requested game could not be found.';
  }
  })
  .catch(error => {
  console.error('Error loading games data:', error);
  document.getElementById('heroTitle').textContent = 'Error Loading Game';
  document.getElementById('gameDescription').textContent = 'Failed to load game data.';
  document.getElementById('gameGameplay').textContent = 'Please try again later.';
  });
  } else {
  // 传统的URL参数方式
  initializePage();
  }
  
  function initializePage() {
      const title = urlParams.get('title');
      const src = urlParams.get('src');
      
      // 更新页面标题和游戏标题
      if (title) {
          document.title = title + ' - Game Player';
          document.getElementById('title').textContent = title;
          document.getElementById('heroTitle').textContent = title;
      }
      
      // 如果有完整的游戏数据，使用它来填充页面信息
      if (currentGame) {
          // 更新游戏封面
          if (currentGame.thumbnail) {
              document.getElementById('heroCover').src = currentGame.thumbnail;
              document.getElementById('heroCover').alt = currentGame.name;
          }
          
          // 更新游戏分类信息
          if (currentGame.category) {
              document.getElementById('heroSub').textContent = currentGame.category + ' Game';
          }
          
          // 更新游戏描述
          if (currentGame.description && currentGame.description !== 'NO DATA') {
              document.getElementById('gameDescription').textContent = currentGame.description;
          } else {
              document.getElementById('gameDescription').textContent = 'No description available for this game.';
          }
          
          // 更新游戏玩法说明
          if (currentGame.gameplay && currentGame.gameplay !== 'NO DATA') {
              document.getElementById('gameGameplay').textContent = currentGame.gameplay;
          } else {
              document.getElementById('gameGameplay').textContent = 'No gameplay instructions available.';
          }
      } else {
          // 如果没有完整游戏数据，尝试从URL参数获取基本信息
          if (title) {
              document.getElementById('gameDescription').textContent = `Play ${title} - An exciting online game.`;
              document.getElementById('gameGameplay').textContent = 'Click "Play Now" to start the game and enjoy!';
          }
      }
      
      // 设置播放按钮和其他交互逻辑
      const playBtn = document.getElementById('playBtn');
      const playerWrap = document.getElementById('playerWrap');
      const hero = document.getElementById('hero');
      const frame = document.getElementById('frame');
      const openBtn = document.getElementById('openBtn');
      const backBtn = document.getElementById('backBtn');
      
      // 播放按钮点击事件
      playBtn.onclick = () => {
          if (src) {
              frame.src = src;
              playerWrap.style.display = 'block';
              hero.style.display = 'none';
              openBtn.href = src;
              document.getElementById('fsBtn').style.display = 'inline-block';
          } else {
              alert('Game source not available');
          }
      };
      
      // 返回按钮
      backBtn.onclick = () => {
          window.location.href = '/';
      };
      
      // 全屏按钮
      const fsBtn = document.getElementById('fsBtn');
      fsBtn.onclick = () => {
          if (frame.requestFullscreen) {
              frame.requestFullscreen();
          }
      };
      
      // 设置打开链接
      if (src) {
          openBtn.href = src;
      }
      
      // 加载推荐游戏
      loadRecommendedGames();
  }
  
  // 加载推荐游戏
  function loadRecommendedGames() {
      fetch('/assets/JSON/games.json')
          .then(response => response.json())
          .then(games => {
              const recoGrid = document.getElementById('recoGrid');
              const currentCategory = currentGame ? currentGame.category : null;
              
              // 筛选推荐游戏（同类别或随机）
              let recommendedGames = games.filter(game => 
                  currentGame ? game.id !== currentGame.id : true
              );
              
              if (currentCategory) {
                  const sameCategory = recommendedGames.filter(game => game.category === currentCategory);
                  if (sameCategory.length >= 4) {
                      recommendedGames = sameCategory;
                  }
              }
              
              // 随机选择4个游戏
              recommendedGames = recommendedGames.sort(() => 0.5 - Math.random()).slice(0, 4);
              
              recoGrid.innerHTML = '';
              recommendedGames.forEach(game => {
                  const gameSlug = game.name
                      .toLowerCase()
                      .replace(/[^a-z0-9\s]/g, '')
                      .replace(/\s+/g, '')
                      .trim();
                  
                  const card = document.createElement('a');
                  card.className = 'reco-card';
                  card.href = `/${gameSlug}`;
                  card.innerHTML = `
                      <img class="reco-thumb" src="${game.thumbnail}" alt="${game.name}">
                      <div class="reco-meta">
                          <div class="reco-name">${game.name}</div>
                          <div class="reco-pub">${game.category}</div>
                      </div>
                  `;
                  recoGrid.appendChild(card);
              });
          })
          .catch(error => {
              console.error('Error loading recommended games:', error);
          });
  }
  </script>
</body>
</html>
